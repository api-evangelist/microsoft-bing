aid: microsoft-bing
url: https://raw.githubusercontent.com/api-evangelist/microsoft-bing/refs/heads/main/apis.yml
apis:
  - aid: microsoft-bing:web-search-api
    name: Bing Web Search API
    tags:
      - Search
      - Web Search
      - Azure AI
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.bing.microsoft.com/v7.0
    humanURL: https://learn.microsoft.com/en-us/bing/search-apis/bing-web-search/overview
    properties:
      - url: https://learn.microsoft.com/en-us/bing/search-apis/bing-web-search/overview
        type: Documentation
      - url: https://learn.microsoft.com/en-us/bing/search-apis/bing-web-search/reference/endpoints
        type: API Reference
    description: >-
      The Bing Web Search API provides a comprehensive web search experience
      by returning relevant web pages, images, videos, news, and more for
      a given search query. It supports market-specific results, safe search
      filtering, and response filtering to customize the types of content
      returned.
  - aid: microsoft-bing:image-search-api
    name: Bing Image Search API
    tags:
      - Search
      - Images
      - Azure AI
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.bing.microsoft.com/v7.0
    humanURL: https://learn.microsoft.com/en-us/bing/search-apis/bing-image-search/overview
    properties:
      - url: https://learn.microsoft.com/en-us/bing/search-apis/bing-image-search/overview
        type: Documentation
    description: >-
      The Bing Image Search API enables developers to search for images
      across the web with advanced filtering options including size, color,
      type, freshness, and license. It returns image metadata, thumbnails,
      and source URLs for integration into applications.
  - aid: microsoft-bing:video-search-api
    name: Bing Video Search API
    tags:
      - Search
      - Videos
      - Azure AI
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.bing.microsoft.com/v7.0
    humanURL: https://learn.microsoft.com/en-us/bing/search-apis/bing-video-search/overview
    properties:
      - url: https://learn.microsoft.com/en-us/bing/search-apis/bing-video-search/overview
        type: Documentation
    description: >-
      The Bing Video Search API allows developers to search for videos
      across the web and retrieve video metadata including thumbnails,
      video URLs, duration, and publisher information. It supports
      filtering by resolution, length, freshness, and pricing.
  - aid: microsoft-bing:news-search-api
    name: Bing News Search API
    tags:
      - Search
      - News
      - Azure AI
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.bing.microsoft.com/v7.0
    humanURL: https://learn.microsoft.com/en-us/bing/search-apis/bing-news-search/overview
    properties:
      - url: https://learn.microsoft.com/en-us/bing/search-apis/bing-news-search/overview
        type: Documentation
    description: >-
      The Bing News Search API returns relevant news articles from across
      the web for a given query. It supports trending topics, category-based
      news, and filtering by freshness and market. Results include article
      titles, descriptions, URLs, images, and provider information.
  - aid: microsoft-bing:entity-search-api
    name: Bing Entity Search API
    tags:
      - Search
      - Entities
      - Knowledge Graph
      - Azure AI
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.bing.microsoft.com/v7.0
    humanURL: https://learn.microsoft.com/en-us/bing/search-apis/bing-entity-search/overview
    properties:
      - url: https://learn.microsoft.com/en-us/bing/search-apis/bing-entity-search/overview
        type: Documentation
    description: >-
      The Bing Entity Search API returns structured information about
      people, places, organizations, and other entities. It provides
      entity cards with rich metadata from Bing's knowledge graph,
      including descriptions, images, and related facts.
  - aid: microsoft-bing:autosuggest-api
    name: Bing Autosuggest API
    tags:
      - Search
      - Autosuggest
      - Autocomplete
      - Azure AI
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.bing.microsoft.com/v7.0
    humanURL: https://learn.microsoft.com/en-us/bing/search-apis/bing-autosuggest/overview
    properties:
      - url: https://learn.microsoft.com/en-us/bing/search-apis/bing-autosuggest/overview
        type: Documentation
    description: >-
      The Bing Autosuggest API provides intelligent search query suggestions
      as users type, improving search experiences with real-time autocomplete
      functionality. It returns ranked suggestions based on partial query
      strings and user context.
  - aid: microsoft-bing:spell-check-api
    name: Bing Spell Check API
    tags:
      - Search
      - Spell Check
      - NLP
      - Azure AI
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.bing.microsoft.com/v7.0
    humanURL: https://learn.microsoft.com/en-us/bing/search-apis/bing-spell-check/overview
    properties:
      - url: https://learn.microsoft.com/en-us/bing/search-apis/bing-spell-check/overview
        type: Documentation
    description: >-
      The Bing Spell Check API provides contextual spell checking that
      goes beyond basic dictionary lookups. It can detect and correct
      slang, informal language, homonyms, and other contextual errors
      using machine learning models trained on web-scale data.
  - aid: microsoft-bing:visual-search-api
    name: Bing Visual Search API
    tags:
      - Search
      - Visual Search
      - Image Recognition
      - Azure AI
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.bing.microsoft.com/v7.0
    humanURL: https://learn.microsoft.com/en-us/bing/search-apis/bing-visual-search/overview
    properties:
      - url: https://learn.microsoft.com/en-us/bing/search-apis/bing-visual-search/overview
        type: Documentation
    description: >-
      The Bing Visual Search API enables image-based search by analyzing
      uploaded images or image URLs to find visually similar images,
      identify products, extract text, and discover related content.
      It supports cropping regions within images for targeted searches.
  - aid: microsoft-bing:custom-search-api
    name: Bing Custom Search API
    tags:
      - Search
      - Custom Search
      - Azure AI
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.bing.microsoft.com/v7.0
    humanURL: https://learn.microsoft.com/en-us/bing/search-apis/bing-custom-search/overview
    properties:
      - url: https://learn.microsoft.com/en-us/bing/search-apis/bing-custom-search/overview
        type: Documentation
    description: >-
      The Bing Custom Search API allows developers to create tailored
      search experiences by defining a custom view of the web. Users can
      specify which domains and pages to include or exclude, pin results,
      and boost rankings for specific sites to create focused search
      experiences for specific topics or domains.
  - aid: microsoft-bing:local-business-search-api
    name: Bing Local Business Search API
    tags:
      - Search
      - Local Business
      - Places
      - Azure AI
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.bing.microsoft.com/v7.0
    humanURL: https://learn.microsoft.com/en-us/bing/search-apis/bing-local-business-search/overview
    properties:
      - url: https://learn.microsoft.com/en-us/bing/search-apis/bing-local-business-search/overview
        type: Documentation
    description: >-
      The Bing Local Business Search API returns information about local
      businesses based on search queries and location. It provides business
      details including name, address, phone number, hours of operation,
      and geographic coordinates for nearby businesses and points of interest.
